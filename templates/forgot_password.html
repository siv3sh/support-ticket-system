<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password – Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
  <div class="card">
    <h1>Forgot password</h1>
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    <p style="margin-bottom: 1rem; font-size: 0.9375rem; color: #64748b;">Enter your email and we’ll send you a link to reset your password.</p>
    <form method="post" action="{{ url_for('forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@company.com">
      <button type="submit">Send reset link</button>
    </form>
    <p style="margin-top: 1rem;"><a href="{{ url_for('login') }}">Back to sign in</a></p>
  </div>
</body>
</html>
