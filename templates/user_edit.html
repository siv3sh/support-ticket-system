{% extends "main_layout.html" %}
{% block title %}Edit user – Support{% endblock %}
{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">
{% endblock %}
{% block content %}
  <h1 class="page-title">Edit user</h1>
  <div class="form-card form-max-400">
    <form method="post" action="{{ url_for('user_edit', uid=user._id) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ user.name or '' }}" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" value="{{ user.email or '' }}" readonly>
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" value="{{ user.phone or '' }}">
      </div>
      <div class="form-group">
        <label for="address">Address</label>
        <textarea id="address" name="address">{{ user.address or '' }}</textarea>
      </div>
      <div class="form-group">
        <label for="designation">Designation</label>
        <input type="text" id="designation" name="designation" value="{{ user.designation or '' }}">
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          {% for value, label in roles %}
            <option value="{{ value }}" {{ 'selected' if (user.role or 'agent') == value else '' }}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('user_list') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
